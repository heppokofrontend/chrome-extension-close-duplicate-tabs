<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title data-i18n="extName"></title>
    <link rel="stylesheet" href="./styles/common.css" />
    <link rel="stylesheet" href="./styles/popup.css" />
    <script src="i18n.js" defer></script>
    <script src="popup.js" defer></script>
  </head>
  <body>
    <main>
      <h1 data-i18n="extName"></h1>

      <div class="main">
        <div class="safety">
          <div class="buttons">
            <p>
              <button type="button" data-task-name="remove">
                <span class="inner">
                  <span class="img">
                    <img src="./images/remove.svg" width="64" height="64" alt="" />
                  </span>
                  <span data-i18n="btn_remove">loading...</span>
                </span>
              </button>
            </p>

            <p>
              <button type="button" data-task-name="reload">
                <span class="inner">
                  <span class="img">
                    <img src="./images/reload.svg" width="64" height="64" alt="" />
                  </span>
                  <span data-i18n="btn_reload">loading...</span>
                </span>
              </button>
            </p>
          </div>

          <div class="options">
            <p>
              <label>
                <span class="img">
                  <img src="./images/hash.svg" width="16" height="16" alt="" />
                </span>
                <input
                  type="checkbox"
                  data-option-type="ignoreHash"
                  aria-describedby="desc-ignoreHash"
                />
                <span class="label" data-i18n="checkbox_hash">loading...</span>
              </label>
            </p>

            <p class="hint" id="desc-ignoreHash">
              <span role="img" aria-label="hint">💡</span>
              https://example.com/abc/def?query=hoge&query2=piyo<em>#hash</em>
            </p>

            <p>
              <label>
                <span class="img">
                  <img src="./images/query.svg" width="16" height="16" alt="" />
                </span>
                <input
                  type="checkbox"
                  data-option-type="ignoreQuery"
                  aria-describedby="desc-ignoreQuery"
                />
                <span class="label" data-i18n="checkbox_query">loading...</span>
              </label>
            </p>

            <p class="hint" id="desc-ignoreQuery">
              <span role="img" aria-label="hint">💡</span>
              https://example.com/abc/def<em>?query=hoge&query2=piyo</em>#hash
            </p>

            <section id="advanced-path-rules">
              <div class="advanced-path-rules">
                <h2 class="advanced-path-rules__h2">ADVANCED PATH RULES</h2>

                <h3 class="advanced-path-rules__default-heading">Default</h3>
                <dl>
                  <dt><label for="default-ignore-pathname">pathname</label></dt>
                  <dd>
                    <input
                      type="checkbox"
                      data-option-type="ignorePathname"
                      id="default-ignore-pathname"
                    />
                  </dd>
                  <dt><label for="default-ignore-query">query</label></dt>
                  <dd>
                    <input
                      type="checkbox"
                      data-option-type="ignoreQuery"
                      id="default-ignore-query"
                    />
                  </dd>
                  <dt><label for="default-ignore-hash">hash</label></dt>
                  <dd>
                    <input type="checkbox" data-option-type="ignoreHash" id="default-ignore-hash" />
                  </dd>
                </dl>

                <div id="advanced-path-rules__custom-rules"></div>

                <template id="advanced-path-rule-template">
                  <section class="advanced-path-rule">
                    <div class="advanced-path-rules__header">
                      <h3 class="advanced-path-rules__heading"></h3>
                      <p>
                        <input
                          type="text"
                          class="advanced-path-rules__origin"
                          aria-label="Origin"
                          placeholder="http://localhost:3000"
                        />
                      </p>
                    </div>

                    <dl>
                      <dt><label>pathname</label></dt>
                      <dd><input type="checkbox" class="advanced-path-rules__pathname" /></dd>
                      <dt><label>query</label></dt>
                      <dd><input type="checkbox" class="advanced-path-rules__query" /></dd>
                      <dt><label>hash</label></dt>
                      <dd><input type="checkbox" class="advanced-path-rules__hash" /></dd>
                      <dt>delete</dt>
                      <dd>
                        <button type="button" class="advanced-path-rules__delete">Delete</button>
                      </dd>
                    </dl>
                  </section>
                </template>

                <p>
                  <button type="button" id="advanced-path-rules__add">
                    <span>Add</span>
                  </button>
                </p>
              </div>
            </section>

            <p>
              <label>
                <!-- 擬似要素を隠すためのaria-hidden -->
                <span class="img" aria-hidden="true">
                  <img src="./images/icon.png" width="16" height="16" alt="" />
                </span>
                <span class="label" data-i18n="select_for_screen_reader_updateBadgeMode"
                  >loading...</span
                >
                <select data-option-type="updateBadgeMode">
                  <option value="none" data-i18n="option_updateBadgeMode_none">loading...</option>
                  <option value="all" data-i18n="option_updateBadgeMode_all">loading...</option>
                  <option value="current" data-i18n="option_updateBadgeMode_current">
                    loading...
                  </option>
                </select>
                <span class="value" aria-hidden="true">loading...</span>
              </label>
            </p>
          </div>
        </div>

        <details class="danger" id="dangerDetails">
          <summary><span>Danger Zone</span></summary>

          <div class="content">
            <div class="buttons">
              <p>
                <button type="button" data-task-name="categorize">
                  <span class="inner">
                    <span class="img">
                      <img src="./images/categorize.svg" width="28" height="28" alt="" />
                    </span>
                    <span data-i18n="btn_categorize">loading...</span>
                  </span>
                </button>
              </p>

              <p>
                <button type="button" data-task-name="divide">
                  <span class="inner">
                    <span class="img">
                      <img src="./images/divide.svg" width="32" height="32" alt="" />
                    </span>
                    <span data-i18n="btn_divide">loading...</span>
                  </span>
                </button>
              </p>

              <p>
                <button type="button" data-task-name="sort">
                  <span class="inner">
                    <span class="img">
                      <img src="./images/sort.svg" width="32" height="24" alt="" />
                    </span>
                    <span data-i18n="btn_sort">loading...</span>
                  </span>
                </button>
              </p>

              <p>
                <button type="button" data-task-name="combine">
                  <span class="inner">
                    <span class="img">
                      <img src="./images/combine.svg" width="32" height="32" alt="" />
                    </span>
                    <span data-i18n="btn_combine">loading...</span>
                  </span>
                </button>
              </p>
            </div>

            <div class="options">
              <p>
                <label>
                  <span class="img">
                    <img src="./images/allwindow.svg" width="16" height="16" alt="" />
                  </span>
                  <input type="checkbox" data-option-type="includeAllWindow" />
                  <span class="label" data-i18n="checkbox_window">loading...</span>
                </label>
              </p>

              <p>
                <label>
                  <span class="img">
                    <img src="./images/pinned.svg" width="16" height="16" alt="" />
                  </span>
                  <input type="checkbox" data-option-type="includePinnedTabs" />
                  <span class="label" data-i18n="checkbox_pinned">loading...</span>
                </label>
              </p>

              <p>
                <label>
                  <span class="img" aria-hidden="true"> / </span>
                  <input
                    type="checkbox"
                    data-option-type="ignorePathname"
                    aria-describedby="desc-ignorePathname desc-ignorePathname2"
                  />
                  <span class="label" data-i18n="checkbox_pathname">loading...</span>
                </label>
              </p>

              <p class="hint" id="desc-ignorePathname">
                <span role="img" aria-label="hint">💡</span>
                <span>https://example.com<em>/abc/def</em>?query=hoge&query2=piyo#hash</span>
              </p>
              <p class="hint" id="desc-ignorePathname2">
                <span role="img" aria-label="hint">💡</span>
                <span data-i18n="hint_pathname"></span>
              </p>

              <p>
                <label>
                  <span class="img">
                    <img src="./images/toc.svg" width="16" height="16" alt="" />
                  </span>
                  <input
                    type="checkbox"
                    data-option-type="forcedChangeURLWhenClickedAnchorLink"
                    aria-describedby="desc-forcedChangeURLWhenClickedAnchorLink"
                  />
                  <span class="label" data-i18n="checkbox_forcedChangeURLWhenClickedAnchorLink"
                    >loading...</span
                  >
                </label>
              </p>

              <p class="hint" id="desc-forcedChangeURLWhenClickedAnchorLink">
                <span role="img" aria-label="hint">💡</span>
                <span data-i18n="hint_forcedChangeURLWhenClickedAnchorLink"></span>
              </p>

              <p>
                <label>
                  <span class="img">
                    <img src="./images/auto-avoid-duplicate.svg" width="16" height="16" alt="" />
                  </span>
                  <input
                    type="checkbox"
                    data-option-type="autoAvoidDuplicate"
                    aria-describedby="desc-autoAvoidDuplicate"
                  />
                  <span class="label" data-i18n="checkbox_autoAvoidDuplicate">loading...</span>
                </label>
              </p>

              <p class="hint" id="desc-autoAvoidDuplicate">
                <span role="img" aria-label="hint">💡</span>
                <span data-i18n="hint_autoAvoidDuplicate"></span>
              </p>

              <p>
                <label>
                  <span class="img">
                    <img src="./images/gear.svg" width="14" height="16" alt="" />
                  </span>
                  <input type="checkbox" data-option-type="useAdvancedPathRule" />
                  <span class="label" data-i18n="checkbox_useAdvancedPathRule">loading...</span>
                </label>
              </p>

              <p class="hint" id="desc-useAdvancedPathRule">
                <span role="img" aria-label="hint">💡</span>
                <span data-i18n="hint_useAdvancedPathRule"></span>
              </p>

              <p>
                <label>
                  <span class="img">
                    <img src="./images/silent.svg" width="14" height="16" alt="" />
                  </span>
                  <input type="checkbox" data-option-type="noConfirm" />
                  <span class="label" data-i18n="checkbox_silent">loading...</span>
                </label>
              </p>
            </div>
          </div>
        </details>
      </div>
    </main>

    <dialog id="notice" role="dialog" aria-modal="true" tabindex="-1">
      <p id="notice-text"></p>
      <p>
        <button type="button" id="notice-close">OK</button>
      </p>
    </dialog>

    <dialog id="confirm" role="alertdialog" tabindex="-1">
      <p id="confirm-text"></p>
      <p id="dialog-buttons"></p>
    </dialog>
  </body>
</html>
